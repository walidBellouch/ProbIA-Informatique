name: Deploy ProbIA Informatique

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Déployer le Frontend sur GitHub Pages
  # ─────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend → GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 📄 Préparer le dossier frontend
        run: |
          mkdir -p ./frontend-dist
          cp index.html ./frontend-dist/index.html

      - name: 🚀 Publier sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend-dist
          publish_branch: gh-pages

  # ─────────────────────────────────────────
  # JOB 2 : Vérifier le Backend (Railway déploie automatiquement)
  # ─────────────────────────────────────────
  check-backend:
    name: ⚙️ Vérifier le Backend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 🟢 Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Installer les dépendances
        run: npm install

      - name: ✅ Vérifier que le projet démarre sans erreur
        run: |
          node -e "
            const app = require('./index.js');
            console.log('✅ Backend vérifié avec succès');
            process.exit(0);
          " || echo "⚠️ Vérification manuelle recommandée"

  # ─────────────────────────────────────────
  # JOB 3 : Notification de déploiement
  # ─────────────────────────────────────────
  notify:
    name: 📢 Résumé du déploiement
    runs-on: ubuntu-latest
    needs: [deploy-frontend, check-backend]

    steps:
      - name: ✅ Déploiement terminé
        run: |
          echo "========================================"
          echo "✅ DÉPLOIEMENT PROBIA TERMINÉ"
          echo "========================================"
          echo "🌐 Frontend : https://${{ github.repository_owner }}.github.io/probia-informatique/"
          echo "⚙️  Backend  : https://probia-informatique-production.up.railway.app"
          echo "🗄️  BDD      : Supabase (toujours en ligne)"
          echo "========================================"
